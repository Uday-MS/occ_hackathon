{% extends "base.html" %}

{% block title %}Country Analysis — Startup Intelligence{% endblock %}
{% block page_title %}Country Analysis{% endblock %}

{% block content %}

<!-- ===== FILTERS ===== -->
<div class="filters-bar">
    <div class="filter-group">
        <span class="filter-label">Industry</span>
        <select class="filter-select" id="countryIndustryFilter">
            <option value="all">All Industries</option>
            {% for ind in industries %}
            <option value="{{ ind }}">{{ ind }}</option>
            {% endfor %}
        </select>
    </div>
</div>

<!-- ===== COUNTRY CHART ===== -->
<div class="charts-grid">
    <div class="chart-card full-width animate-in">
        <div class="chart-card-header">
            <div class="chart-card-title"><span>🌍</span> Top Countries by Funding</div>
        </div>
        <div class="chart-container" style="min-height: 480px; max-height: 580px;">
            <canvas id="countryChart"></canvas>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
(function() {
    let countryChart = null;
    const barColors = [
        '#34d399', '#38bdf8', '#a78bfa', '#fb923c',
        '#f472b6', '#22d3ee', '#facc15', '#818cf8',
        '#4ade80', '#c084fc'
    ];

    function buildChart(labels, values) {
        const ctx = document.getElementById('countryChart').getContext('2d');

        if (countryChart) countryChart.destroy();

        countryChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Funding (USD)',
                    data: values,
                    backgroundColor: barColors.map(c => c + '99'),
                    borderColor: barColors,
                    borderWidth: 1.5,
                    borderRadius: 6,
                    borderSkipped: false,
                    maxBarThickness: 80,
                    barPercentage: 0.75,
                    categoryPercentage: 0.8,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                // Strict interaction — only the bar directly under cursor
                interaction: {
                    mode: 'point',
                    intersect: true,
                },
                hover: {
                    mode: 'point',
                    intersect: true,
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#94a3b8',
                            font: { family: 'Inter', size: 12, weight: '500' },
                            padding: 16,
                            usePointStyle: true,
                            pointStyleWidth: 10,
                        }
                    },
                    tooltip: {
                        mode: 'point',
                        intersect: true,
                        position: 'barCenter',
                        backgroundColor: 'rgba(15, 23, 42, 0.95)',
                        titleColor: '#f1f5f9',
                        bodyColor: '#94a3b8',
                        borderColor: 'rgba(148, 163, 184, 0.15)',
                        borderWidth: 1,
                        padding: 14,
                        cornerRadius: 10,
                        titleFont: { family: 'Inter', size: 13, weight: '600' },
                        bodyFont: { family: 'Inter', size: 12 },
                        displayColors: true,
                        boxPadding: 4,
                        callbacks: {
                            label: function(ctx) {
                                return ctx.dataset.label + ': $' + formatNumber(ctx.raw);
                            }
                        }
                    },
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(148, 163, 184, 0.06)', drawBorder: false },
                        ticks: { color: '#64748b', font: { family: 'Inter', size: 11 }, maxRotation: 45 },
                        border: { display: false },
                    },
                    y: {
                        grid: { color: 'rgba(148, 163, 184, 0.06)', drawBorder: false },
                        ticks: {
                            color: '#64748b',
                            font: { family: 'Inter', size: 11 },
                            callback: function(value) { return '$' + formatNumber(value); }
                        },
                        border: { display: false },
                    }
                }
            }
        });
    }

    // Initial chart
    buildChart({{ labels | tojson }}, {{ values | tojson }});

    // Filter: Industry
    document.getElementById('countryIndustryFilter').addEventListener('change', function() {
        const industry = this.value;
        fetch('/api/countries?industry=' + encodeURIComponent(industry))
            .then(r => r.json())
            .then(data => {
                buildChart(data.labels, data.values);
            });
    });
})();
</script>
{% endblock %}
