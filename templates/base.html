<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StartupIQ — Explore the global startup ecosystem through an immersive, data-driven intelligence platform.">
    <title>{% block title %}StartupIQ — Global Startup Intelligence{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- ===== TOP NAVBAR ===== -->
    <nav class="top-navbar" id="topNavbar">
        <div class="navbar-inner">
            <!-- Brand -->
            <a href="/" class="navbar-brand" id="nav-brand">
                <span class="navbar-brand-icon"></span>
                <span class="navbar-brand-text">StartupIQ</span>
            </a>

            <!-- Nav Links -->
            <div class="navbar-links" id="navbarLinks">
                <a href="/" class="navbar-link {% if page == 'dashboard' %}active{% endif %}" id="nav-home">
                    <span class="navbar-link-icon"></span>
                    <span>Home</span>
                </a>
                <a href="/trends" class="navbar-link {% if page == 'trends' %}active{% endif %}" id="nav-trends">
                    <span class="navbar-link-icon"></span>
                    <span>Explore</span>
                </a>
                <a href="/sector" class="navbar-link {% if page == 'sectors' %}active{% endif %}" id="nav-sectors">
                    <span class="navbar-link-icon"></span>
                    <span>Sectors</span>
                </a>
                <a href="/country" class="navbar-link {% if page == 'countries' %}active{% endif %}" id="nav-countries">
                    <span class="navbar-link-icon"></span>
                    <span>Countries</span>
                </a>
                <a href="/india" class="navbar-link {% if page == 'india' %}active{% endif %}" id="nav-india">
                    <span class="navbar-link-icon"></span>
                    <span>India Analysis</span>
                </a>
                <a href="/search" class="navbar-link {% if page == 'search' %}active{% endif %}" id="nav-search">
                    <span class="navbar-link-icon">🔍</span>
                    <span>Search</span>
                </a>
            </div>

            <!-- Live Badge + Mobile Toggle -->
            <div class="navbar-right">
                <span class="header-badge" id="liveBadge">Live Data</span>
                <button class="navbar-toggle" id="navbarToggle" aria-label="Toggle navigation">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT AREA ===== -->
    <main class="main-content">
        {% block hero %}{% endblock %}

        <!-- Page Content -->
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Main Script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <!-- Navbar mobile toggle -->
    <script>
        (function() {
            const toggle = document.getElementById('navbarToggle');
            const links = document.getElementById('navbarLinks');
            if (toggle && links) {
                toggle.addEventListener('click', function() {
                    links.classList.toggle('open');
                    toggle.classList.toggle('active');
                });
            }
        })();
    </script>

    {% block scripts %}{% endblock %}

</body>
</html>
